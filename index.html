<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日待辦</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- ── Login View ── -->
  <div class="view active" id="view-login">
    <div class="login-container">
      <div class="login-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"></path>
          <path d="m9 12 2 2 4-4"></path>
        </svg>
      </div>
      <h1 class="login-title">每日待辦</h1>
      <p class="login-subtitle">請輸入您的專屬 ID 與手機號碼</p>
      
      <div class="form-group">
        <label for="login-id">使用者 ID</label>
        <input type="text" id="login-id" placeholder="例如：yun" autocomplete="off">
      </div>
      
      <div class="form-group">
        <label for="login-phone">手機號碼</label>
        <input type="tel" id="login-phone" placeholder="例如：0912345678" autocomplete="off">
      </div>
      
      <button class="btn-login" id="btn-login">登入 / 註冊</button>
      <div class="login-error" id="login-error"></div>
      
      <div class="powered-by">Powered by Sharkyun</div>
    </div>
  </div>

  <!-- ── Calendar View ── -->
  <div class="view" id="view-cal">
    <div class="cal-header">
      <button class="cal-nav" id="prev-btn">&#8249;</button>
      <div class="cal-month" id="cal-month-label"></div>
      <button class="cal-nav" id="next-btn">&#8250;</button>
    </div>
    
    <!-- Dashboard Summary -->
    <div class="dashboard-wrap">
      <div class="stat-card">
        <div class="stat-label">本週完成率</div>
        <div class="stat-val" id="stat-weekly">--%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">本月完成率</div>
        <div class="stat-val" id="stat-monthly">--%</div>
      </div>
    </div>
    
    <div class="action-wrap">
      <button class="btn-ranking" id="btn-open-ranking">🏆 好友排行榜</button>
    </div>

    <div class="cal-grid">
      <div class="cal-weekdays">
        <div class="cal-wd">日</div>
        <div class="cal-wd">一</div>
        <div class="cal-wd">二</div>
        <div class="cal-wd">三</div>
        <div class="cal-wd">四</div>
        <div class="cal-wd">五</div>
        <div class="cal-wd">六</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
    <div class="legend">
      <span class="legend-label">完成率</span>
      <div class="legend-dots">
        <div class="legend-dot" style="background:#e8f5e9;border:0.5px solid #c8e6c9;"></div>
        <div class="legend-dot" style="background:#a5d6a7;"></div>
        <div class="legend-dot" style="background:#66bb6a;"></div>
        <div class="legend-dot" style="background:#2e7d32;"></div>
      </div>
      <span class="legend-label">低 → 高</span>
    </div>
    <div class="logout-container">
      <button id="btn-logout" class="btn-logout">登出</button>
    </div>
  </div>

  <!-- ── List View ── -->
  <div class="view" id="view-list">
    <div class="list-header">
      <button class="back-btn" id="back-btn">&#8249; 日曆</button>
      <div class="sync-status" id="sync-status">已同步</div>
    </div>
    <div class="list-date-label" id="list-date-label"></div>
    <div class="list-title" id="list-title"></div>
    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar" id="progress" style="width:0%"></div>
      </div>
      <div class="progress-pct" id="progress-pct">0%</div>
    </div>
    <div class="section-label" id="pending-label">待完成</div>
    <ul class="todo-list" id="todo-list"></ul>
    <div id="done-section" style="display:none">
      <div class="section-label">已完成</div>
      <ul class="todo-list" id="done-list"></ul>
    </div>
  </div>

  <!-- ── Ranking View ── -->
  <div class="view" id="view-ranking">
    <div class="list-header">
      <button class="back-btn" id="btn-back-ranking">&#8249; 返回</button>
    </div>
    <div class="list-title" id="ranking-title">本月排行榜</div>
    
    <div class="add-friend-wrap">
      <input type="tel" id="friend-phone" placeholder="輸入好友手機號碼加入比較" autocomplete="off">
      <button id="btn-add-friend">加入</button>
    </div>
    
    <ul class="ranking-list" id="ranking-list">
      <li class="empty-state">載入中...</li>
    </ul>
  </div>

</div>

<!-- FAB -->
<button class="fab" id="fab">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <line x1="9" y1="3" x2="9" y2="15" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="3" y1="9" x2="15" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
</button>

<!-- Overlay + Bottom Sheet -->
<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">新增任務</div>
  
  <div class="quick-add-wrap" id="quick-add-wrap">
    <button class="btn-quick">📖 閱讀 30 分鐘</button>
    <button class="btn-quick">🏋️ 運動健身</button>
    <button class="btn-quick">💧 喝水 2000cc</button>
    <button class="btn-quick">✍️ 寫日記</button>
  </div>

  <input type="text" id="new-task" placeholder="今天要做什麼？" maxlength="80" />
  <div class="sheet-actions">
    <button class="btn-cancel" id="btn-cancel">取消</button>
    <button class="btn-add" id="btn-add">新增</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
